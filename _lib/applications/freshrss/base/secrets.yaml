---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: freshrss-db-creds
  namespace: freshrss
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: freshrss-db-creds
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: freshrss_${ENVIRONMENT}
        property: username
    - secretKey: password
      remoteRef:
        key: freshrss_${ENVIRONMENT}
        property: password
    - secretKey: database
      remoteRef:
        key: freshrss_${ENVIRONMENT}
        property: database
    - secretKey: host
      remoteRef:
        key: freshrss_${ENVIRONMENT}
        property: host
    - secretKey: port
      remoteRef:
        key: freshrss_${ENVIRONMENT}
        property: port

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: freshrss-admin
  namespace: freshrss
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: freshrss-admin
    creationPolicy: Owner
  data:
    - secretKey: admin_user
      remoteRef:
        key: freshrss_${ENVIRONMENT}
        property: admin_user
    - secretKey: admin_password
      remoteRef:
        key: freshrss_${ENVIRONMENT}
        property: admin_password
    - secretKey: admin_email
      remoteRef:
        key: freshrss_${ENVIRONMENT}
        property: admin_email
