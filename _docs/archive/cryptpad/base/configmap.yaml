---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cryptpad-config
  namespace: cryptpad
  labels:
    app.kubernetes.io/name: cryptpad
    app.kubernetes.io/instance: cryptpad-${ENVIRONMENT}
    environment: "${ENVIRONMENT}"
data:
  config.js: |
    /* CryptPad config — managed by Flux. Edit _lib/applications/cryptpad/base/configmap.yaml. */
    module.exports = {
      httpUnsafeOrigin:   'https://${CRYPTPAD_SUBDOMAIN}.home-0ps.com',
      httpSafeOrigin:     'https://${CRYPTPAD_SANDBOX_SUBDOMAIN}.home-0ps.com',
      httpAddress:        '::',
      httpPort:           3000,
      websocketPort:      3003,
      maxWorkers:         undefined,
      adminEmail:         'fr3d@home-0ps.com',
      // adminKeys wired through ExternalSecret + env in PR 3 (Authentik/OIDC).
      adminKeys:          [],
      logToStdout:        true,
      logLevel:           'info',
      filePath:           '/cryptpad/data/datastore/',
      archivePath:        '/cryptpad/data/archive/',
      pinPath:            '/cryptpad/data/pins/',
      taskPath:           '/cryptpad/data/tasks/',
      blockPath:          '/cryptpad/block/',
      blobPath:           '/cryptpad/blob/',
      blobStagingPath:    '/cryptpad/blob/staging/',
      decreeStorage:      '/cryptpad/data/decrees/',
      installMethod:      'kubernetes',
    };
