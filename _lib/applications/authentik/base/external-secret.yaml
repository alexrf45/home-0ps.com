---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-env
  namespace: authentik
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: authentik-env
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # CNPG bootstrap.initdb.secret consumes these two keys
        username: "{{ .username }}"
        password: "{{ .password }}"
        # Authentik chart consumes the AUTHENTIK_* keys via existingSecret
        AUTHENTIK_POSTGRESQL__USER: "{{ .username }}"
        AUTHENTIK_POSTGRESQL__PASSWORD: "{{ .password }}"
        AUTHENTIK_POSTGRESQL__NAME: "{{ .database }}"
        AUTHENTIK_POSTGRESQL__HOST: "authentik-${ENVIRONMENT}-cluster-rw.authentik.svc"
        AUTHENTIK_POSTGRESQL__PORT: "5432"
        AUTHENTIK_SECRET_KEY: "{{ .secret_key }}"
        AUTHENTIK_BOOTSTRAP_EMAIL: "{{ .bootstrap_email }}"
        AUTHENTIK_BOOTSTRAP_PASSWORD: "{{ .bootstrap_password }}"
        AUTHENTIK_BOOTSTRAP_TOKEN: "{{ .bootstrap_token }}"
  data:
    - secretKey: username
      remoteRef:
        key: authentik_${ENVIRONMENT}
        property: username
    - secretKey: password
      remoteRef:
        key: authentik_${ENVIRONMENT}
        property: password
    - secretKey: database
      remoteRef:
        key: authentik_${ENVIRONMENT}
        property: database
    - secretKey: secret_key
      remoteRef:
        key: authentik_${ENVIRONMENT}
        property: secret_key
    - secretKey: bootstrap_email
      remoteRef:
        key: authentik_${ENVIRONMENT}
        property: bootstrap_email
    - secretKey: bootstrap_password
      remoteRef:
        key: authentik_${ENVIRONMENT}
        property: bootstrap_password
    - secretKey: bootstrap_token
      remoteRef:
        key: authentik_${ENVIRONMENT}
        property: bootstrap_token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-r2-creds
  namespace: authentik
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: authentik-r2-creds
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: authentik-r2-creds
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: authentik-r2-creds
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: AWS_REGION
      remoteRef:
        key: authentik-r2-creds
        property: AWS_REGION
    - secretKey: AWS_ENDPOINT_URL
      remoteRef:
        key: authentik-r2-creds
        property: AWS_ENDPOINT_URL
    - secretKey: BUCKET_NAME
      remoteRef:
        key: authentik-r2-creds
        property: BUCKET_NAME
