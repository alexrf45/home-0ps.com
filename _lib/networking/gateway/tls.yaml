---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-tls
  namespace: networking
spec:
  secretName: wildcard-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "*.home-0ps.com"
  dnsNames:
  - "*.home-0ps.com"
  - "home-0ps.com"
  # Multi-label internal hostnames (three labels deep, e.g. dev.int.X) are
  # NOT covered by the single-label *.home-0ps.com wildcard, so each is added
  # as an explicit SAN. They all share this one cert because Cilium Gateway's
  # per-SNI selection across multiple certificateRefs is unreliable (it serves
  # the first ref for all SNIs) — one SAN cert sidesteps that.
  - "dev.int.auth.home-0ps.com"
  - "dev.int.grafana.home-0ps.com"
  - "dev.int.homer.home-0ps.com"
  - "dev.int.freshrss.home-0ps.com"
  - "dev.int.docs.home-0ps.com"
