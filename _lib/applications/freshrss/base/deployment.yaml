---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss
  namespace: freshrss
  labels:
    app.kubernetes.io/name: freshrss
    app.kubernetes.io/instance: freshrss-${ENVIRONMENT}
    app.kubernetes.io/version: "${FRESHRSS_VERSION}"
    environment: "${ENVIRONMENT}"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: freshrss
  template:
    metadata:
      labels:
        app: freshrss
        node: worker
        env: "${ENVIRONMENT}"
        app.kubernetes.io/name: freshrss
        app.kubernetes.io/instance: freshrss-${ENVIRONMENT}
        app.kubernetes.io/version: "${FRESHRSS_VERSION}"
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: freshrss
          image: freshrss/freshrss:${FRESHRSS_VERSION}
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: TZ
              value: America/New_York
            - name: CRON_MIN
              value: "*/20"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: freshrss-db-creds
                  key: host
            - name: DB_BASE
              valueFrom:
                secretKeyRef:
                  name: freshrss-db-creds
                  key: database
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: freshrss-db-creds
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freshrss-db-creds
                  key: password
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: freshrss-admin
                  key: admin_user
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freshrss-admin
                  key: admin_password
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: freshrss-admin
                  key: admin_email
            - name: FRESHRSS_INSTALL
              value: |-
                --api-enabled
                --base-url https://${FRESHRSS_SUBDOMAIN}.home-0ps.com
                --db-type pgsql
                --db-host $(DB_HOST)
                --db-base $(DB_BASE)
                --db-user $(DB_USER)
                --db-password $(DB_PASSWORD)
                --db-prefix freshrss_
                --default-user $(ADMIN_USER)
                --auth-type form
            - name: FRESHRSS_USER
              value: |-
                --user $(ADMIN_USER)
                --password $(ADMIN_PASSWORD)
                --api-password $(ADMIN_PASSWORD)
                --email $(ADMIN_EMAIL)
                --language en
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: data
              mountPath: /var/www/FreshRSS/data
            - name: extensions
              mountPath: /var/www/FreshRSS/extensions
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run
          livenessProbe:
            httpGet:
              path: /i/?c=index&a=index
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /i/?c=index&a=index
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ${FRESHRSS_PVC_NAME}
        - name: extensions
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
