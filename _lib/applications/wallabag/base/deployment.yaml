---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag
  namespace: wallabag
  labels:
    app.kubernetes.io/name: wallabag
    app.kubernetes.io/instance: wallabag-${ENVIRONMENT}
    app.kubernetes.io/version: "${WALLABAG_VERSION}"
    environment: "${ENVIRONMENT}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallabag
  template:
    metadata:
      labels:
        app: wallabag
        node: worker
        env: "${ENVIRONMENT}"
        app.kubernetes.io/name: wallabag
        app.kubernetes.io/instance: wallabag-${ENVIRONMENT}
        app.kubernetes.io/version: "${WALLABAG_VERSION}"
    spec:
      securityContext:
        fsGroup: 33
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      # The wallabag/wallabag image expects to run as root: its entrypoint
      # writes app/config/parameters.yml, and Symfony writes cache/logs/
      # sessions under var/ plus uploaded entry images under
      # web/assets/images/. Those paths are root-owned in the image.
      #
      # This init container (root) seeds three emptyDirs with the image's
      # original content and chowns them to UID 33 so the main container
      # can run as non-root and still write where it needs to.
      - name: seed-writable-dirs
        image: wallabag/wallabag:${WALLABAG_VERSION}
        imagePullPolicy: Always
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
            add:
            - CHOWN
            - DAC_OVERRIDE
            - FOWNER
          seccompProfile:
            type: RuntimeDefault
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          cp -a /var/www/wallabag/app/config/. /seed/config/
          [ -d /var/www/wallabag/var ] && cp -a /var/www/wallabag/var/. /seed/var/ || true
          [ -d /var/www/wallabag/web/assets/images ] && cp -a /var/www/wallabag/web/assets/images/. /seed/images/ || true
          cp -a /etc/php81/conf.d/. /seed/php-conf/
          chown -R 33:33 /seed/config /seed/var /seed/images /seed/php-conf
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 256Mi
            cpu: 500m
        volumeMounts:
        - name: wallabag-config
          mountPath: /seed/config
        - name: wallabag-var
          mountPath: /seed/var
        - name: wallabag-images
          mountPath: /seed/images
        - name: wallabag-php-conf
          mountPath: /seed/php-conf
      containers:
      - name: wallabag-web
        image: wallabag/wallabag:${WALLABAG_VERSION}
        imagePullPolicy: Always
        securityContext:
          runAsNonRoot: true
          runAsUser: 33
          runAsGroup: 33
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 1Gi
            cpu: 1000m
        ports:
        - containerPort: 80
        volumeMounts:
        - name: wallabag-config
          mountPath: /var/www/wallabag/app/config
        - name: wallabag-var
          mountPath: /var/www/wallabag/var
        - name: wallabag-images
          mountPath: /var/www/wallabag/web/assets/images
        - name: wallabag-php-conf
          mountPath: /etc/php81/conf.d
        env:
        - name: SYMFONY__ENV__DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: username
        - name: SYMFONY__ENV__DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: password
        - name: SYMFONY__ENV__DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: database
        - name: SYMFONY__ENV__DATABASE_PORT
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: port
        - name: SYMFONY__ENV__DATABASE_HOST
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: server
        - name: SYMFONY__ENV__DATABASE_DRIVER
          value: "pdo_pgsql"
        - name: SYMFONY__ENV__FOSUSER_REGISTRATION
          value: "false"
        - name: POPULATE_DATABASE
          value: "true"
        - name: PHP_MEMORY_LIMIT
          value: 500M
        - name: SYMFONY__ENV__DOMAIN_NAME
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: url
        - name: SYMFONY__ENV__SECRET
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: app_secret
        - name: SYMFONY__ENV__REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: redis_host
        - name: SYMFONY__ENV__REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: redis_password
      volumes:
      - name: wallabag-config
        emptyDir: {}
      - name: wallabag-var
        emptyDir: {}
      - name: wallabag-images
        emptyDir: {}
      - name: wallabag-php-conf
        emptyDir: {}
