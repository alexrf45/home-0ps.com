---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app: "observability"
    env: "dev"
    # node-exporter needs hostNetwork, hostPID, hostPath, hostPort.
    # baseline rejects these; privileged is the canonical level for
    # monitoring namespaces.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
