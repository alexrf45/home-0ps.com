name: Rotate Slack Bot Token

on:
  schedule:
    # Every 6 hours — tokens expire at 12h, this gives a 6h safety window
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate:
    name: Refresh Slack OAuth Token
    runs-on: ubuntu-latest

    steps:
      - name: Refresh token via Slack API
        id: rotate
        run: |
          RESPONSE=$(curl -sf -X POST https://slack.com/api/oauth.v2.access \
            --user "${{ secrets.SLACK_CLIENT_ID }}:${{ secrets.SLACK_CLIENT_SECRET }}" \
            --data-urlencode "grant_type=refresh_token" \
            --data-urlencode "refresh_token=${{ secrets.SLACK_REFRESH_TOKEN }}")

          OK=$(echo "$RESPONSE" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "Rotation failed: $(echo "$RESPONSE" | jq -r '.error')" >&2
            exit 1
          fi

          NEW_ACCESS=$(echo "$RESPONSE" | jq -r '.access_token')
          NEW_REFRESH=$(echo "$RESPONSE" | jq -r '.refresh_token')
          EXPIRES_IN=$(echo "$RESPONSE" | jq -r '.expires_in // "43200"')

          # Mask values so they never appear in logs
          echo "::add-mask::$NEW_ACCESS"
          echo "::add-mask::$NEW_REFRESH"

          echo "access_token=$NEW_ACCESS" >> "$GITHUB_OUTPUT"
          echo "refresh_token=$NEW_REFRESH" >> "$GITHUB_OUTPUT"
          echo "expires_in=$EXPIRES_IN" >> "$GITHUB_OUTPUT"

      - name: Update GitHub secrets
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_TOKEN }}
        run: |
          echo "${{ steps.rotate.outputs.access_token }}" \
            | gh secret set SLACK_BOT_TOKEN --repo ${{ github.repository }}
          echo "${{ steps.rotate.outputs.refresh_token }}" \
            | gh secret set SLACK_REFRESH_TOKEN --repo ${{ github.repository }}

      - name: Confirm rotation via Slack
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ steps.rotate.outputs.access_token }}
          payload: |
            channel: "${{ vars.SLACK_CHANNEL_ID }}"
            text: ":key: Slack bot token rotated"
            blocks:
              - type: context
                elements:
                  - type: mrkdwn
                    text: ":key: Bot token rotated successfully — next expiry in ${{ steps.rotate.outputs.expires_in }}s"

      - name: Notify on failure
        if: failure()
        run: |
          # Use the existing (potentially still valid) token to alert
          curl -sf -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"${{ vars.SLACK_CHANNEL_ID }}\",
              \"text\": \":warning: Slack token rotation failed — manual intervention required\",
              \"blocks\": [{
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \":warning: *Token rotation failed.* The current token may expire soon.\\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failed run>\"
                }
              }]
            }" || true
