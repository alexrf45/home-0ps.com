---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: syncthing-creds
  namespace: syncthing
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: syncthing-creds
    creationPolicy: Owner
  data:
    - secretKey: gui-user
      remoteRef:
        key: syncthing_${ENVIRONMENT}
        property: gui-user
    - secretKey: gui-password
      remoteRef:
        key: syncthing_${ENVIRONMENT}
        property: gui-password
