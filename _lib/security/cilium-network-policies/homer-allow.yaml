---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: homer-allow
  labels:
    home-0ps.com/policy-target: application
    app: homer
spec:
  description: |
    Allow rules for the homer dashboard pod. Homer is a static file server:
    it accepts gateway ingress on 8080 and needs DNS only. The dashboard's
    connectivity checks run in the browser, not the pod, so no egress to the
    linked services is required.
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: homer
      app: homer
  ingress:
    # Cilium Gateway API: backend connections arrive from the
    # reserved:ingress identity (the cilium-envoy proxy). host /
    # remote-node covers kubelet probes when they hit port 8080.
    - fromEntities:
        - ingress
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # DNS lookup against kube-dns
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
