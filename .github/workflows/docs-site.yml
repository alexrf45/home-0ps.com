name: docs-site

# Builds the MkDocs documentation site into a container image and pushes it to
# GHCR. Flux then deploys it in-cluster (_lib/applications/docs-site).
on:
  push:
    branches: [dev, main]
    paths:
      - "_docs/**"
      - "mkdocs.yml"
      - "main.py"
      - "requirements-docs.txt"
      - "docs-site/**"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/home-0ps-docs
          tags: |
            type=raw,value=dev-latest,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docs-site/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report pushed digest
        run: |
          echo "pushed-digest: ${{ steps.build.outputs.digest }}"
          echo "### docs-site image" >> "$GITHUB_STEP_SUMMARY"
          echo "\`ghcr.io/${{ github.repository_owner }}/home-0ps-docs@${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
