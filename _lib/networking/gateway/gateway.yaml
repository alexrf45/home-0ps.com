apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ${GATEWAY_NAME}
  namespace: networking
spec:
  gatewayClassName: cilium
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
  - name: https
    protocol: HTTPS
    port: 443
    tls:
      mode: Terminate
      # Multiple certs: Cilium Gateway selects per-SNI. wildcard-tls is
      # the default (*.home-0ps.com), cryptpad-tls explicitly covers
      # dev.int.cryptpad.home-0ps.com + dev.int.sandbox.cryptpad.home-0ps.com
      # so the browser-enforced two-origin sandbox boundary works.
      certificateRefs:
      - kind: Secret
        name: wildcard-tls
        namespace: networking
      - kind: Secret
        name: cryptpad-tls
        namespace: networking
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            ${GATEWAY_NAME}: "true"
  - name: http-redirect
    protocol: HTTP
    port: 8080
    allowedRoutes:
      namespaces:
        from: All
