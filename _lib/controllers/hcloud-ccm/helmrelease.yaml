---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hcloud-cloud-controller-manager
  namespace: flux-system
spec:
  chart:
    spec:
      chart: hcloud-cloud-controller-manager
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: hcloud-ccm
        namespace: flux-system
      version: ">=1.0.0 <2.0.0"
  interval: 15m
  maxHistory: 3
  install:
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: -1
  releaseName: hcloud-cloud-controller-manager
  targetNamespace: kube-system
  values:
    networking:
      enabled: true
      clusterCIDR: "10.42.0.0/16"
    robot:
      enabled: false
    env:
      - name: HCLOUD_TOKEN
        valueFrom:
          secretKeyRef:
            name: hcloud
            key: token
    tolerations:
      - key: "node.cloudprovider.kubernetes.io/uninitialized"
        value: "true"
        effect: "NoSchedule"
      - key: "CriticalAddonsOnly"
        operator: "Exists"
      - key: "node-role.kubernetes.io/control-plane"
        effect: "NoSchedule"
        operator: "Exists"
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoSchedule"
