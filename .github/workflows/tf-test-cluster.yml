name: Test Cluster (Ephemeral)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test'
        required: true
        type: string
      branch:
        description: 'Branch to test (defaults to triggering branch)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Spin Up / Verify / Destroy
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    defaults:
      run:
        working-directory: terraform/hetzner

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.head_ref || github.ref }}

      - name: Resolve branch name
        id: branch
        run: |
          BRANCH="${{ inputs.branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="${{ github.head_ref }}"
          fi
          if [ -z "$BRANCH" ]; then
            BRANCH="${{ github.ref_name }}"
          fi
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Notify Slack — test cluster starting
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ vars.SLACK_CHANNEL_ID }}"
            text: "Test cluster spinning up for PR #${{ inputs.pr_number }}"
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: ":rocket: Test Cluster Starting"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*PR:*\n<https://github.com/alexrf45/home-0ps.com/pull/${{ inputs.pr_number }}|#${{ inputs.pr_number }}>"
                  - type: mrkdwn
                    text: "*Branch:*\n`${{ steps.branch.outputs.name }}`"
              - type: context
                elements:
                  - type: mrkdwn
                    text: "Estimated duration: ~25 min | Will auto-destroy after verification"

      - name: Setup tools
        run: |
          # Terraform
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install -y terraform

          # SOPS
          SOPS_VER=$(curl -s https://api.github.com/repos/getsops/sops/releases/latest | grep tag_name | cut -d'"' -f4 | tr -d v)
          curl -fsSL "https://github.com/getsops/sops/releases/download/v${SOPS_VER}/sops-v${SOPS_VER}.linux.amd64" -o /usr/local/bin/sops
          chmod +x /usr/local/bin/sops

          # Talosctl
          curl -fsSL https://github.com/siderolabs/talos/releases/latest/download/talosctl-linux-amd64 -o /usr/local/bin/talosctl
          chmod +x /usr/local/bin/talosctl

          # Flux CLI
          curl -s https://fluxcd.io/install.sh | sudo bash

      - name: Decrypt tfvars
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          echo "$SOPS_AGE_KEY" > /tmp/age.key
          SOPS_AGE_KEY_FILE=/tmp/age.key sops --decrypt terraform.tfvars.enc > decrypted.auto.tfvars
          rm /tmp/age.key

      - name: Write backend config
        env:
          TF_BACKEND_CONFIG: ${{ secrets.TF_BACKEND_CONFIG }}
        run: echo "$TF_BACKEND_CONFIG" > remote.tfbackend

      - name: Prepare CI overrides
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          PR="${{ inputs.pr_number }}"
          sed "s|__CI_BRANCH__|${BRANCH}|g" ci-override.tfvars.json > ci-resolved.tfvars.json

      - name: Terraform Init (PR state)
        run: |
          terraform init \
            -backend-config="remote.tfbackend" \
            -backend-config="key=hetzner-pr-${{ inputs.pr_number }}/terraform.tfstate" \
            -upgrade

      - name: Terraform Apply
        id: apply
        run: |
          PR="${{ inputs.pr_number }}"
          terraform apply --auto-approve \
            -var-file=decrypted.auto.tfvars \
            -var-file=ci-resolved.tfvars.json \
            -var "env=pr${PR}" \
            -var "cluster_name=pr${PR}" \
            -var "bootstrap_cluster=true"
          LB_IP=$(terraform output -raw lb_ipv4)
          ENDPOINT=$(terraform output -raw cluster_endpoint)
          echo "::add-mask::$LB_IP"
          echo "::add-mask::$ENDPOINT"
          echo "lb_ipv4=$LB_IP" >> "$GITHUB_OUTPUT"
          echo "cluster_endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"

      - name: Export configs
        run: |
          terraform output -raw kubeconfig > /tmp/kubeconfig
          terraform output -raw talos_config > /tmp/talosconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"

      - name: Extract control plane IP
        id: cp
        run: |
          CP_IP=$(terraform output -raw cluster_endpoint | sed 's|https://||;s|:6443||')
          echo "::add-mask::$CP_IP"
          echo "ip=$CP_IP" >> "$GITHUB_OUTPUT"

      # Verification suite
      - name: 1. Node readiness
        run: kubectl wait --for=condition=Ready nodes --all --timeout=5m

      - name: 2. Talos health
        run: |
          talosctl health \
            --talosconfig /tmp/talosconfig \
            --nodes ${{ steps.cp.outputs.ip }} \
            --wait-timeout 3m

      - name: 3. Flux core layers
        run: |
          flux wait kustomization cluster-config crds controllers \
            --timeout=5m \
            --kubeconfig /tmp/kubeconfig

      - name: 4. Full Flux reconciliation
        run: |
          flux wait kustomization --all \
            --timeout=15m \
            --kubeconfig /tmp/kubeconfig

      - name: 5. Load balancer reachability
        run: |
          LB="${{ steps.apply.outputs.lb_ipv4 }}"
          curl -sf --retry 10 --retry-delay 15 --retry-connrefused "http://${LB}" || true

      - name: 6. Wallabag pod health
        run: |
          kubectl wait --for=condition=Ready pod \
            -l app.kubernetes.io/name=wallabag \
            -n wallabag \
            --timeout=3m

      - name: Destroy test cluster
        if: always()
        run: |
          PR="${{ inputs.pr_number }}"
          terraform destroy --auto-approve \
            -var-file=decrypted.auto.tfvars \
            -var-file=ci-resolved.tfvars.json \
            -var "env=pr${PR}" \
            -var "cluster_name=pr${PR}" \
            -var "bootstrap_cluster=false" || true

      - name: Post result to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            const icon = success ? '✅' : '❌';
            const body = `## ${icon} Test Cluster Result

            **Branch:** \`${{ steps.branch.outputs.name }}\`
            **Status:** ${{ job.status }}

            | Check | Result |
            |---|---|
            | Node readiness | checked |
            | Talos health | checked |
            | Flux core layers | checked |
            | Full reconciliation | checked |
            | LB reachability | checked |
            | Wallabag pods | checked |

            _Ephemeral cluster destroyed after test._`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ inputs.pr_number }}'),
              body,
            });

      - name: Notify Slack — test cluster result
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ vars.SLACK_CHANNEL_ID }}"
            text: "Test cluster ${{ job.status }} for PR #${{ inputs.pr_number }}"
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "${{ job.status == 'success' && ':white_check_mark: Test Cluster Passed' || ':x: Test Cluster Failed' }}"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*PR:*\n<https://github.com/alexrf45/home-0ps.com/pull/${{ inputs.pr_number }}|#${{ inputs.pr_number }}>"
                  - type: mrkdwn
                    text: "*Branch:*\n`${{ steps.branch.outputs.name }}`"
                  - type: mrkdwn
                    text: "*Load Balancer:*\n`${{ steps.apply.outputs.lb_ipv4 }}`"
                  - type: mrkdwn
                    text: "*Status:*\n${{ job.status }}"
              - type: context
                elements:
                  - type: mrkdwn
                    text: "Cluster destroyed after test | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"

      - name: Cleanup sensitive files
        if: always()
        run: rm -f decrypted.auto.tfvars remote.tfbackend ci-resolved.tfvars.json /tmp/kubeconfig /tmp/talosconfig
