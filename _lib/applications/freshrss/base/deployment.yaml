---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss
  namespace: freshrss
  labels:
    app.kubernetes.io/name: freshrss
    app.kubernetes.io/instance: freshrss-${ENVIRONMENT}
    app.kubernetes.io/version: "${FRESHRSS_VERSION}"
    environment: "${ENVIRONMENT}"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: freshrss
  template:
    metadata:
      labels:
        app: freshrss
        node: worker
        env: "${ENVIRONMENT}"
        app.kubernetes.io/name: freshrss
        app.kubernetes.io/instance: freshrss-${ENVIRONMENT}
        app.kubernetes.io/version: "${FRESHRSS_VERSION}"
    spec:
      securityContext:
        # apache user (100) is a member of www-data (82); fsGroup ensures
        # emptyDirs and the data PVC are group-accessible on mount.
        fsGroup: 82
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # The FreshRSS Alpine entrypoint runs as root to modify /etc/php84/php.ini
        # and write Docker/env.txt. Since apache (UID 100) can't write those
        # root-owned paths, this init container (root with CHOWN/DAC_OVERRIDE/FOWNER)
        # seeds both into emptyDirs owned by apache:www-data (100:82), and
        # pre-chowns the persistent data volume so the main container can write it.
        - name: seed-writable-dirs
          image: freshrss/freshrss:${FRESHRSS_VERSION}
          imagePullPolicy: Always
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              cp -a /etc/php84/. /seed/php84/
              cp -a /var/www/FreshRSS/Docker/. /seed/docker/
              chown -R 100:82 /seed/php84 /seed/docker
              chown -R 100:82 /var/www/FreshRSS/data
              chmod -R g+rX,g+w /var/www/FreshRSS/data
              sed -i -e '/\/etc\/localtime/d' -e '/\/etc\/timezone/d' /seed/docker/entrypoint.sh
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 500m
          volumeMounts:
            - name: freshrss-php84
              mountPath: /seed/php84
            - name: freshrss-docker
              mountPath: /seed/docker
            - name: data
              mountPath: /var/www/FreshRSS/data
      containers:
        - name: freshrss
          image: freshrss/freshrss:${FRESHRSS_VERSION}
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 82
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - /opt/freshrss-init/bootstrap.sh
            - httpd
            - -D
            - FOREGROUND
          env:
            - name: TZ
              value: America/New_York
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: freshrss-db-creds
                  key: host
            - name: DB_BASE
              valueFrom:
                secretKeyRef:
                  name: freshrss-db-creds
                  key: database
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: freshrss-db-creds
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freshrss-db-creds
                  key: password
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: freshrss-db-creds
                  key: admin_user
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freshrss-db-creds
                  key: admin_password
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: freshrss-db-creds
                  key: admin_email
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: freshrss-php84
              mountPath: /etc/php84
            - name: freshrss-docker
              mountPath: /var/www/FreshRSS/Docker
            - name: data
              mountPath: /var/www/FreshRSS/data
            - name: extensions
              mountPath: /var/www/FreshRSS/extensions
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run
            - name: freshrss-init-script
              mountPath: /opt/freshrss-init
              readOnly: true
          livenessProbe:
            httpGet:
              path: /i/?c=index&a=index
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /i/?c=index&a=index
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: freshrss-php84
          emptyDir: {}
        - name: freshrss-docker
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: ${FRESHRSS_PVC_NAME}
        - name: extensions
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: freshrss-init-script
          configMap:
            name: freshrss-init-script
            defaultMode: 0755
            items:
              - key: bootstrap.sh
                path: bootstrap.sh
