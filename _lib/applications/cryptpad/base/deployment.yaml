---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cryptpad
  namespace: cryptpad
  labels:
    app.kubernetes.io/name: cryptpad
    app.kubernetes.io/instance: cryptpad-${ENVIRONMENT}
    app.kubernetes.io/version: "${CRYPTPAD_VERSION}"
    environment: "${ENVIRONMENT}"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cryptpad
  template:
    metadata:
      labels:
        app: cryptpad
        node: worker
        env: "${ENVIRONMENT}"
        app.kubernetes.io/name: cryptpad
        app.kubernetes.io/instance: cryptpad-${ENVIRONMENT}
        app.kubernetes.io/version: "${CRYPTPAD_VERSION}"
    spec:
      securityContext:
        fsGroup: 4001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cryptpad
          image: cryptpad/cryptpad:version-${CRYPTPAD_VERSION}
          imagePullPolicy: IfNotPresent
          # Pin runAsUser/Group on the container — the Kyverno
          # add-default-securitycontext mutation would otherwise override
          # pod-level values to 65534. See
          # project_kyverno_default_securitycontext.
          securityContext:
            runAsNonRoot: true
            runAsUser: 4001
            runAsGroup: 4001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            # The upstream docker-entrypoint.sh uses these. Without
            # CPAD_CONF the `if [ ! -f "$CPAD_CONF" ]` test always passes
            # and the entrypoint fails on `cp .../config.example.js ""`.
            - name: CPAD_CONF
              value: /cryptpad/config/config.js
            - name: CPAD_MAIN_DOMAIN
              value: "https://${CRYPTPAD_SUBDOMAIN}.home-0ps.com"
            - name: CPAD_SANDBOX_DOMAIN
              value: "https://${CRYPTPAD_SANDBOX_SUBDOMAIN}.home-0ps.com"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: ws
              containerPort: 3003
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 768Mi
          volumeMounts:
            - name: config
              mountPath: /cryptpad/config/config.js
              subPath: config.js
              readOnly: true
            - name: data
              mountPath: /cryptpad/data
              subPath: data
            - name: data
              mountPath: /cryptpad/blob
              subPath: blob
            - name: data
              mountPath: /cryptpad/block
              subPath: block
            - name: tmp
              mountPath: /tmp
          # The entrypoint runs `npm run build` on every container start,
          # which can take 60-180s. Gate liveness/readiness behind a
          # generous startupProbe so a slow cold start isn't mistaken for
          # an unhealthy container.
          startupProbe:
            httpGet:
              path: /api/config
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/config
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/config
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: config
          configMap:
            name: cryptpad-config
            items:
              - key: config.js
                path: config.js
        - name: data
          persistentVolumeClaim:
            claimName: ${CRYPTPAD_DATA_PVC_NAME}
        - name: tmp
          emptyDir: {}
