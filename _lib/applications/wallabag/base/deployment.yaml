---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag
  namespace: wallabag
  labels:
    app.kubernetes.io/name: wallabag
    app.kubernetes.io/instance: wallabag-${ENVIRONMENT}
    app.kubernetes.io/version: "${WALLABAG_VERSION}"
    environment: "${ENVIRONMENT}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallabag
  template:
    metadata:
      labels:
        app: wallabag
        node: worker
        env: "${ENVIRONMENT}"
        app.kubernetes.io/name: wallabag
        app.kubernetes.io/instance: wallabag-${ENVIRONMENT}
        app.kubernetes.io/version: "${WALLABAG_VERSION}"
    spec:
      securityContext:
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      # The wallabag/wallabag image is Alpine-based and chowns
      # /var/www/wallabag to nobody:nobody (UID 65534) at build time, so
      # running the main container as 65534 lets it write app/config/
      # parameters.yml, var/cache, var/logs, var/sessions, and web/assets/
      # images directly — no shadow mounts needed.
      #
      # Paths the image leaves root-owned that the entrypoint writes at
      # startup: /etc/php81/conf.d/ (50_wallabag.ini), /etc/s6/ (s6-svscan
      # lockfile), /var/lib/nginx/ (logs + tmp), /var/run/ (nginx.pid),
      # /var/log/ (php-fpm.log). This init container (root) seeds each into
      # an emptyDir and chowns to 65534 so the main container can write
      # them without privilege.
      - name: seed-writable-dirs
        image: wallabag/wallabag:${WALLABAG_VERSION}
        imagePullPolicy: Always
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
            add:
            - CHOWN
            - DAC_OVERRIDE
            - FOWNER
          seccompProfile:
            type: RuntimeDefault
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          cp -a /etc/php81/conf.d/. /seed/php-conf/
          cp -a /etc/s6/. /seed/s6/
          cp -a /var/lib/nginx/. /seed/nginx-lib/
          cp -a /var/run/. /seed/varrun/ 2>/dev/null || true
          cp -a /var/log/. /seed/varlog/ 2>/dev/null || true
          chown -R 65534:65534 /seed/php-conf /seed/s6 /seed/nginx-lib /seed/varrun /seed/varlog
        resources:
          requests:
            memory: 32Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 500m
        volumeMounts:
        - name: wallabag-php-conf
          mountPath: /seed/php-conf
        - name: wallabag-s6
          mountPath: /seed/s6
        - name: wallabag-nginx-lib
          mountPath: /seed/nginx-lib
        - name: wallabag-varrun
          mountPath: /seed/varrun
        - name: wallabag-varlog
          mountPath: /seed/varlog
      containers:
      - name: wallabag-web
        image: wallabag/wallabag:${WALLABAG_VERSION}
        imagePullPolicy: Always
        # The wallabag entrypoint runs `su -c "composer install" nobody`
        # unconditionally (and for import/migrate modes). SUID-based privilege
        # switching doesn't work in this cluster — Talos's containerd applies
        # restrictions that prevent the SUID bit from elevating EUID even
        # with allowPrivilegeEscalation: true. We sidestep this by mounting
        # a passthrough `su` shim at /opt/shims/su (configmap wallabag-shims)
        # and prepending it to PATH below; the entrypoint resolves to the
        # shim instead of BusyBox su, no privilege change needed.
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          runAsGroup: 65534
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 1Gi
            cpu: 1000m
        ports:
        - containerPort: 80
        volumeMounts:
        - name: wallabag-php-conf
          mountPath: /etc/php81/conf.d
        - name: wallabag-s6
          mountPath: /etc/s6
        - name: wallabag-nginx-lib
          mountPath: /var/lib/nginx
        - name: wallabag-varrun
          mountPath: /var/run
        - name: wallabag-varlog
          mountPath: /var/log
        - name: wallabag-shims
          mountPath: /opt/shims
          readOnly: true
        env:
        - name: PATH
          value: "/opt/shims:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
        - name: SYMFONY__ENV__DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: username
        - name: SYMFONY__ENV__DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: password
        - name: SYMFONY__ENV__DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: database
        - name: SYMFONY__ENV__DATABASE_PORT
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: port
        - name: SYMFONY__ENV__DATABASE_HOST
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: server
        - name: SYMFONY__ENV__DATABASE_DRIVER
          value: "pdo_pgsql"
        - name: SYMFONY__ENV__FOSUSER_REGISTRATION
          value: "false"
        - name: POPULATE_DATABASE
          value: "true"
        - name: PHP_MEMORY_LIMIT
          value: 500M
        - name: SYMFONY__ENV__DOMAIN_NAME
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: url
        - name: SYMFONY__ENV__SECRET
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: app_secret
        - name: SYMFONY__ENV__REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: redis_host
        - name: SYMFONY__ENV__REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wallabag-creds
              key: redis_password
      volumes:
      - name: wallabag-php-conf
        emptyDir: {}
      - name: wallabag-s6
        emptyDir: {}
      - name: wallabag-nginx-lib
        emptyDir: {}
      - name: wallabag-varrun
        emptyDir: {}
      - name: wallabag-varlog
        emptyDir: {}
      - name: wallabag-shims
        configMap:
          name: wallabag-shims
          defaultMode: 0755
          items:
          - key: su
            path: su
