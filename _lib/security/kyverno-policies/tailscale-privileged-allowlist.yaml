---
# Narrows the privileged surface in the `tailscale` namespace.
#
# The namespace is labeled `pod-security.kubernetes.io/enforce: privileged`
# because the Tailscale operator builds Service-typed proxy StatefulSets
# (ts-* pods) that REQUIRE kernel-mode networking:
#   - sysctler init container flips net.ipv4.ip_forward (privileged + caps)
#   - main tailscale container sets up iptables NAT rules in the pod's
#     netns to forward Service traffic to/from tailnet endpoints. This
#     also requires privileged + root (write access to /run/xtables.lock).
#
# Userspace mode (TS_USERSPACE=true) only works for Ingress-class proxies
# the operator builds for ingressClass=tailscale; ProxyGroups (ingress or
# egress) need kernel-mode for NAT.
#
# This policy keeps the privileged opening narrow:
#   - Main containers may set privileged: true ONLY when the pod is owned
#     by a StatefulSet whose name starts with `ts-` (operator-managed).
#     Anything else in the namespace stays denied.
#   - Init containers may set privileged: true ONLY when named `sysctler`
#     (the operator's hardcoded init, regardless of owner).
#
# Both rules run in Enforce mode so violations are denied at admission,
# not merely audited.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-privileged-tailscale
  annotations:
    policies.kyverno.io/title: Restrict Privileged in Tailscale Namespace
    policies.kyverno.io/category: Pod Security Standards (Baseline)
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Allows only the operator's hardcoded `sysctler` init container to
      run privileged in the tailscale namespace; forbids privileged on
      every other container. Compensates for the namespace running on
      privileged PSA enforce.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: forbid-privileged-main-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
                - UPDATE
              namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: tailscale
      preconditions:
        all:
          # Skip pods owned by ts-* StatefulSets (operator-managed
          # ProxyGroup proxies). Their main tailscale container is
          # privileged by design — the privileged-PSA label permits it.
          - key: "{{ request.object.metadata.ownerReferences[?kind=='StatefulSet' && starts_with(name, 'ts-')] | length(@) }}"
            operator: Equals
            value: 0
      validate:
        message: "Privileged containers are not allowed in the tailscale namespace (main containers)."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                all:
                  - key: "{{ element.securityContext.privileged || `false` }}"
                    operator: Equals
                    value: true

    - name: restrict-privileged-init-containers-to-sysctler
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
                - UPDATE
              namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: tailscale
      validate:
        message: "Only init containers named 'sysctler' may run privileged in the tailscale namespace."
        foreach:
          - list: "request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                all:
                  - key: "{{ element.securityContext.privileged || `false` }}"
                    operator: Equals
                    value: true
                  - key: "{{ element.name }}"
                    operator: NotEquals
                    value: sysctler
