---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: couchdb
  namespace: obsidian-livesync
  labels:
    app.kubernetes.io/name: obsidian-livesync
    app.kubernetes.io/instance: obsidian-livesync-${ENVIRONMENT}
    app.kubernetes.io/version: "${OBSIDIAN_LIVESYNC_VERSION}"
    environment: "${ENVIRONMENT}"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: obsidian-livesync
  template:
    metadata:
      labels:
        app: obsidian-livesync
        node: worker
        env: "${ENVIRONMENT}"
        app.kubernetes.io/name: obsidian-livesync
        app.kubernetes.io/instance: obsidian-livesync-${ENVIRONMENT}
        app.kubernetes.io/version: "${OBSIDIAN_LIVESYNC_VERSION}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 5984
        runAsGroup: 5984
        fsGroup: 5984
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: couchdb
          image: couchdb:${OBSIDIAN_LIVESYNC_VERSION}
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 5984
            runAsGroup: 5984
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  name: couchdb-creds
                  key: COUCHDB_USER
            - name: COUCHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: couchdb-creds
                  key: COUCHDB_PASSWORD
          ports:
            - name: http
              containerPort: 5984
              protocol: TCP
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 1000m
          volumeMounts:
            - name: data
              mountPath: /opt/couchdb/data
            - name: config
              mountPath: /opt/couchdb/etc/local.d/local.ini
              subPath: local.ini
              readOnly: true
          livenessProbe:
            httpGet:
              path: /_up
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /_up
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: couchdb-data
        - name: config
          configMap:
            name: couchdb-config
