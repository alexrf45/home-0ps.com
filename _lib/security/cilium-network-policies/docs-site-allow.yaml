---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: docs-site-allow
  labels:
    home-0ps.com/policy-target: application
    app: docs-site
spec:
  description: |
    Allow rules for the docs-site (MkDocs static site). It accepts gateway
    ingress on 8080 and needs DNS only — the rendered HTML is fully static,
    so the pod makes no outbound calls.
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: docs-site
      app: docs-site
  ingress:
    # Cilium Gateway API: backend connections arrive from the reserved:ingress
    # identity (cilium-envoy). host / remote-node covers kubelet probes on 8080.
    - fromEntities:
        - ingress
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # DNS lookup against kube-dns
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
