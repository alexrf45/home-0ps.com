---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/name: monitoring
    app.kubernetes.io/component: observability
    # node-exporter (kube-prometheus-stack DaemonSet) needs hostNetwork,
    # hostPID, hostPath, hostPort. Talos defaults to baseline; privileged
    # is the canonical level for namespaces with host-scoped collectors.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
