---
# CryptPad's two-origin design (main + sandbox hostname for E2EE iframe
# isolation) requires a TLS cert whose SAN matches each origin. The
# default *.home-0ps.com wildcard is a single-label match per RFC 6125
# and does not cover dev.int.cryptpad.home-0ps.com or
# dev.int.sandbox.cryptpad.home-0ps.com — browsers silently block the
# sandbox iframe when it hits a hostname-mismatch cert.
#
# This Certificate stays on letsencrypt-staging for parity with the
# rest of the dev cluster. The signing CA still isn't browser-trusted;
# either import the LE staging root CA into your trust store once, or
# accept the warning at each hostname (per-origin exception) once.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cryptpad-tls
  namespace: networking
spec:
  secretName: cryptpad-tls
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  commonName: "dev.int.cryptpad.home-0ps.com"
  dnsNames:
    - "dev.int.cryptpad.home-0ps.com"
    - "dev.int.sandbox.cryptpad.home-0ps.com"
