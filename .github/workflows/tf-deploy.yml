name: Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/hetzner/**'
      - '_clusters/hetzner/**'
      - '_lib/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Terraform Apply (Production)
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    environment: production
    defaults:
      run:
        working-directory: terraform/hetzner

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack — deploy starting
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ vars.SLACK_CHANNEL_ID }}"
            text: "Production deploy started on `main`"
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: ":rocket: Production Deploy Starting"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*Triggered by:*\n${{ github.actor }}"
                  - type: mrkdwn
                    text: "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ steps.sha.outputs.short }}`>"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: View Run
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Install SOPS
        run: |
          SOPS_VER=$(curl -s https://api.github.com/repos/getsops/sops/releases/latest | grep tag_name | cut -d'"' -f4 | tr -d v)
          curl -fsSL "https://github.com/getsops/sops/releases/download/v${SOPS_VER}/sops-v${SOPS_VER}.linux.amd64" -o /usr/local/bin/sops
          chmod +x /usr/local/bin/sops

      - name: Decrypt tfvars
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          echo "$SOPS_AGE_KEY" > /tmp/age.key
          SOPS_AGE_KEY_FILE=/tmp/age.key sops --decrypt terraform.tfvars.enc > decrypted.auto.tfvars
          rm /tmp/age.key

      - name: Write backend config
        env:
          TF_BACKEND_CONFIG: ${{ secrets.TF_BACKEND_CONFIG }}
        run: echo "$TF_BACKEND_CONFIG" > remote.tfbackend

      - name: Terraform Init
        run: terraform init -backend-config="remote.tfbackend" -upgrade

      - name: Terraform Plan
        run: terraform plan -no-color -var-file=decrypted.auto.tfvars -out=plan.out 2>&1 | tee /tmp/plan.txt

      - name: Terraform Apply
        id: apply
        run: |
          terraform apply -no-color plan.out 2>&1 | tee /tmp/apply.txt
          LB_IP=$(terraform output -raw lb_ipv4)
          echo "::add-mask::$LB_IP"
          echo "lb_ipv4=$LB_IP" >> "$GITHUB_OUTPUT"

      - name: Post deploy summary
        if: always()
        run: |
          echo "## Production Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Infrastructure details sent to Slack._" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack — deploy result
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ vars.SLACK_CHANNEL_ID }}"
            text: "Production deploy ${{ job.status }}"
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "${{ job.status == 'success' && ':white_check_mark: Production Deploy Complete' || ':x: Production Deploy Failed' }}"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*Status:*\n${{ job.status }}"
                  - type: mrkdwn
                    text: "*Load Balancer:*\n`${{ steps.apply.outputs.lb_ipv4 }}`"
                  - type: mrkdwn
                    text: "*Triggered by:*\n${{ github.actor }}"
                  - type: mrkdwn
                    text: "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: View Run
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Cleanup sensitive files
        if: always()
        run: rm -f decrypted.auto.tfvars remote.tfbackend plan.out
