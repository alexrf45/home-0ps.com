---
# Chart-managed ServiceMonitor doesn't expose `scheme` or `tlsConfig`, so we
# ship our own. Connect API serves /metrics on :8443 over TLS — the cert
# (op-connect-tls) is signed by the cluster's internal PKI, which Prometheus
# does not trust by default. insecureSkipVerify is fine here: the scrape is
# in-cluster, against a well-known service, with bearer-auth gating Connect's
# data endpoints (metrics path is unauthenticated by design).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: onepassword-connect
  namespace: onepassword
  labels:
    app.kubernetes.io/name: connect
    app.kubernetes.io/component: connect
spec:
  namespaceSelector:
    matchNames:
      - onepassword
  selector:
    matchLabels:
      app.kubernetes.io/name: connect
      app.kubernetes.io/component: connect
  endpoints:
    - port: connect-api-https
      path: /metrics
      interval: 30s
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
