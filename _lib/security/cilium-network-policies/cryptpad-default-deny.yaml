---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: cryptpad-default-deny
  labels:
    home-0ps.com/policy-target: application
    app: cryptpad
spec:
  description: |
    Default-deny ingress + egress for every pod in the cryptpad
    namespace. The companion cryptpad-allow CCNP grants the explicit
    exceptions cryptpad needs.
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: cryptpad
  ingress:
    - fromEndpoints: []
  egress:
    - toEndpoints: []
