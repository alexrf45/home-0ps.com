---
apiVersion: v1
kind: Service
metadata:
  name: syncthing
  namespace: syncthing
  labels:
    app.kubernetes.io/name: syncthing
    app.kubernetes.io/instance: syncthing-${ENVIRONMENT}
    app.kubernetes.io/version: "${SYNCTHING_VERSION}"
spec:
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8384
      targetPort: gui
      name: gui
  selector:
    app: syncthing
    node: worker
